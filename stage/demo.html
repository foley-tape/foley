<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Foley — a lo-fi tape instrument that plays your coding agents</title>
<link rel="stylesheet" href="css/stage.css">
<link rel="stylesheet" href="css/plate.css">
<style>
  /* demo 是橱窗不是车间（M2.5 §B.1）：无写盘无导出；DUB 组收起 */
  #dub-group { display: none; }
  #demo-banner {
    position: fixed; left: 0; right: 0; top: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center; gap: 18px;
    padding: 10px 16px;
    background: rgba(10, 8, 5, 0.78); backdrop-filter: blur(2px);
    color: #C9B998; font: 13px/1.5 "Univers", "Neue Haas Grotesk", "Helvetica Neue", Helvetica, Arial, sans-serif;
    letter-spacing: 0.02em;
  }
  #demo-banner .tagline { opacity: 0.85; }
  #power {
    border: 0; cursor: pointer; border-radius: 5px; padding: 7px 18px;
    background: linear-gradient(168deg, #DCCEA6 0%, #B3A077 45%, #8A784F 100%);
    color: #2E2517; font: 600 12px/1 inherit; letter-spacing: 0.22em; text-indent: 0.22em;
    box-shadow: 0 2px 4px rgba(15, 9, 3, 0.55), inset 0 1px 0 rgba(255, 250, 235, 0.4);
  }
  #power:active { transform: translateY(1px); }
  #power[data-on] { filter: brightness(0.88); box-shadow: inset 0 2px 5px rgba(25, 15, 5, 0.45); }
  #demo-credit {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 200;
    text-align: center; padding: 8px 14px;
    color: rgba(201, 185, 152, 0.75); font: 11px/1.6 ui-monospace, Menlo, monospace;
    background: linear-gradient(180deg, transparent, rgba(8, 6, 4, 0.72) 40%);
  }
  #demo-credit a { color: #C9B998; }
</style>
</head>
<body>
<div id="demo-banner">
  <span class="tagline">This is a recording — run <code>npx foley</code> to hear your own.</span>
  <button id="power">POWER</button>
</div>

<div id="room">
  <div id="tower">
    <div id="machine"></div>
    <div id="lib-plate" aria-label="带库">
      <img class="plate" src="assets/lib.webp" alt="the tape library below the machine" decoding="async" draggable="false">
      <i class="lib-lamp" aria-hidden="true"></i>
      <i class="lib-vignette" aria-hidden="true"></i><i class="lib-grain" aria-hidden="true"></i>
    </div>
  </div>

  <canvas id="lens"></canvas>
</div>

<div id="demo-credit">
  a real storm session, replayed · factory record: “Still Life” by HoliznaCC0 (human-made, CC0) ·
  <a href="https://github.com/foley-tape/foley" rel="noopener">github.com/foley-tape/foley</a>
</div>

<script type="module" src="js/demo-boot.js"></script>
</body>
</html>
