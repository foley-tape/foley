<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TAPE·ZERO ♪</title>
<!-- 首光·标签页暖化（第五号手令 丁-E4）：暖琥珀双盘（供带盘薄·收带盘厚）落深褐底——
     标签页也是机器的一寸，不留默认网页冷味。 -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23160f08'/%3E%3Ccircle cx='11' cy='16' r='5.6' fill='none' stroke='%23FFB000' stroke-width='2'/%3E%3Ccircle cx='11' cy='16' r='1.5' fill='%23FFB000'/%3E%3Ccircle cx='22' cy='16' r='3.4' fill='none' stroke='%23E29A2E' stroke-width='2'/%3E%3Ccircle cx='22' cy='16' r='1' fill='%23E29A2E'/%3E%3C/svg%3E">
<link rel="stylesheet" href="css/stage.css">
<link rel="stylesheet" href="css/plate.css">
</head>
<body>
<!-- 带库 TAPE LIBRARY（设计二§一.1 改名·原卡带架 丁-E2 → P0-4 诚实版）：左侧纵向单列开盘带库——实体收纳架质感，弱化网页扁平。
     条目＝仓名＋开场白截断＋相对时间（厂盘报时长）；点带即请后端上机（选中态由后端广播回来，前端不自持）。 -->
<aside id="rack" aria-label="带库">
  <div class="rack-head"><span class="silk">Tape Library</span></div>
  <div id="rack-list"></div>
  <div class="rack-foot silk">TAPE·ZERO</div>
  <i class="rack-spine" aria-hidden="true"></i><!-- 上带后收成一道脊；鼠标移到左缘滑出（船长反馈） -->
</aside>
<div id="room" class="pre-gesture">
  <!-- 首光·PLAY 呼吸示能（丁-E1→014 丙-1 实体化）：灯体灯罩已烘入场景板（拨杆旁钨丝圆顶灯），
       示能辉光层由 buildMachine({playCue}) 随机器生成——手势前唯一亮起，手势即房间醒、示能退场。 -->
  <!-- 状态可诊·信号灯（第五号手令 丁-E5）：喂食断了机器不装死——一枚灯语＋丝印字报当前态，
       无数字、无浏览器弹窗；live 时不在场。 -->
  <div id="signal-cue" aria-hidden="true"><i class="beacon"></i><span class="label silk"></span></div>
  <!-- 高塔（渲染批·镜头即导航）：段A 机器＋段B 带库鞋盒竖排一根长板；镜头下摇=tower translateY -->
  <div id="tower">
    <div id="machine"></div>
    <div id="lib-plate" aria-label="带库">
      <img class="plate" src="assets/lib.webp" alt="the tape library below the machine" decoding="async" draggable="false">
      <i class="lib-lamp" aria-hidden="true"></i>
      <i class="lib-vignette" aria-hidden="true"></i><i class="lib-grain" aria-hidden="true"></i>
    </div>
  </div>

  <!-- 统一光照场（decree6 乙·镜头法）：一束画外暖灯把散乱匀光零件收拢——multiply 从上偏左焦点落差到四角near-black。 -->
  <!-- P0-4 ②：空/首启一句蚀刻向导（不许现代弹窗）——丝印在房间暗处，上带即隐 -->
  <div id="first-etch" aria-hidden="true">从左架取一盘带上机 · LIVE 是正在录的此刻</div>
  <canvas id="lens"></canvas>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
