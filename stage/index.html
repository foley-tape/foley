<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TAPE·ZERO ♪</title>
<!-- 首光·标签页暖化（第五号手令 丁-E4）：暖琥珀双盘（供带盘薄·收带盘厚）落深褐底——
     标签页也是机器的一寸，不留默认网页冷味。 -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23160f08'/%3E%3Ccircle cx='11' cy='16' r='5.6' fill='none' stroke='%23FFB000' stroke-width='2'/%3E%3Ccircle cx='11' cy='16' r='1.5' fill='%23FFB000'/%3E%3Ccircle cx='22' cy='16' r='3.4' fill='none' stroke='%23E29A2E' stroke-width='2'/%3E%3Ccircle cx='22' cy='16' r='1' fill='%23E29A2E'/%3E%3C/svg%3E">
<link rel="stylesheet" href="css/stage.css">
</head>
<body>
<div id="room" class="pre-gesture">
  <!-- 首光·PLAY 呼吸示能（第五号手令 丁-E1／丙.3）：手势前唯一亮起（琥珀呼吸微光），
       手势即房间醒（声＋光同醒），示能退场。diegetic——机器自己的灯语，非现代弹窗按钮。 -->
  <div id="play-cue" aria-hidden="true"><i class="glow"></i><span class="silk">Play</span></div>
  <!-- 状态可诊·信号灯（第五号手令 丁-E5）：喂食断了机器不装死——一枚灯语＋丝印字报当前态，
       无数字、无浏览器弹窗；live 时不在场。 -->
  <div id="signal-cue" aria-hidden="true"><i class="beacon"></i><span class="label silk"></span></div>
  <div id="machine">
    <!-- 走带甲板：带轴上缘出画——机器延伸出画外即尺度暗示 -->
    <div id="deck">
      <div class="reel" id="reel-l"></div>
      <div class="reel" id="reel-r"></div>
      <div id="tapeband"></div>
      <i class="guide" style="left: calc(59vw - 64px)"></i>
      <i class="guide" style="left: calc(59vw + 58px)"></i>
      <div id="counter-housing" title=""><i class="slot"></i></div>
      <div id="loupe">
        <div class="loupe-glass">
          <div class="wheel"></div><div class="wheel"></div><div class="wheel"></div><div class="wheel"></div>
        </div>
      </div>
    </div>
    <div id="panel">
      <!-- 面板固定螺丝：沿边排布，整机延伸出画外 -->
      <i class="screw" style="left:6%;  top:14px; --slot:23deg"></i>
      <i class="screw" style="left:38%; top:14px; --slot:118deg"></i>
      <i class="screw" style="left:70%; top:14px; --slot:74deg"></i>
      <i class="screw" style="left:6%;  bottom:14px; --slot:161deg"></i>
      <i class="screw" style="left:38%; bottom:14px; --slot:9deg"></i>
      <i class="screw" style="left:70%; bottom:14px; --slot:96deg"></i>

      <div id="cluster">
        <!-- VU 针：吃 needle 字段，禁自加缓动 -->
        <section class="block">
          <div class="bezel vu-bezel">
            <svg id="vu-svg" viewBox="0 0 300 200">
              <defs>
                <radialGradient id="backlight" cx="50%" cy="92%" r="95%">
                  <stop offset="0%" stop-color="#F8EDD3"/>
                  <stop offset="55%" stop-color="#F2E6CC"/>
                  <stop offset="100%" stop-color="#DECDA6"/>
                </radialGradient>
                <linearGradient id="vu-glass" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0"   stop-color="#FFF6E0" stop-opacity="0.10"/>
                  <stop offset="0.28" stop-color="#FFF6E0" stop-opacity="0.02"/>
                  <stop offset="0.6" stop-color="#140D06" stop-opacity="0.16"/>
                  <stop offset="1"   stop-color="#140D06" stop-opacity="0.34"/>
                </linearGradient>
                <linearGradient id="vu-streak" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0.32" stop-color="#FFF6E0" stop-opacity="0"/>
                  <stop offset="0.44" stop-color="#FFF6E0" stop-opacity="0.07"/>
                  <stop offset="0.52" stop-color="#FFF6E0" stop-opacity="0"/>
                </linearGradient>
              </defs>
              <rect x="6" y="6" width="288" height="188" rx="7" fill="url(#backlight)"/>
              <g id="ticks"></g>
              <text class="dial-mark" x="150" y="118" text-anchor="middle">VU</text>
              <g id="needle-group" transform="rotate(-47 150 168)">
                <polygon points="148.5,168 150,46 151.5,168" fill="#241A10"/>
                <circle cx="150" cy="168" r="7.5" fill="#241A10"/>
                <circle cx="150" cy="168" r="2.6" fill="#5A4A34"/>
              </g>
              <rect x="6" y="6" width="288" height="188" rx="7" fill="url(#vu-glass)"/>
              <rect x="6" y="6" width="288" height="188" rx="7" fill="url(#vu-streak)"/>
            </svg>
          </div>
          <div class="silk">Tension</div>
        </section>

        <!-- 走纸记录仪：牛血红墨线画 T，纸带即时间轴 -->
        <section class="block">
          <div class="bezel chart-bezel">
            <canvas id="chart-canvas"></canvas>
            <div class="paper-shade"></div>
            <canvas id="dub-overlay"></canvas>
            <div class="glass"></div>
          </div>
          <div class="silk">Recorder</div>
        </section>

        <!-- 灯组：琥珀管终身只说一句话——需要你 -->
        <section class="block block-lamps">
          <div class="tube-housing">
            <div id="amber-tube" style="--lit:0">
              <i class="filament"></i>
              <i class="hotcore"></i>
            </div>
          </div>
          <div class="silk">Ask</div>
          <div class="gem-row">
            <span class="gem-cell">
              <i class="gem emerald" id="emerald" style="--lit:0"></i>
              <span class="silk small">Done</span>
            </span>
            <span class="gem-cell">
              <i class="gem pilot" id="pilot" style="--lit:0.5"></i>
              <span class="silk small">Main</span>
            </span>
          </div>
        </section>
      </div>

      <div id="brand" class="silk">Tape · Zero</div>

      <!-- DUB 剪辑组（M-T1）：操作件不承载读数；时长以纸长签呈现，无数字。
           hover 铭牌（轨乙④）：蚀刻丝印悬停显影，data-cap 说明按件而言、不带读数（面板零数字维持） -->
      <div id="dub-group">
        <div id="dub-lengths" data-cap="纸长签——签越长，撕下的纸越长">
          <button class="len-tab" data-s="30" style="width:18px"></button>
          <button class="len-tab" data-s="45" data-on style="width:27px"></button>
          <button class="len-tab" data-s="60" style="width:36px"></button>
          <button class="len-tab" data-s="90" style="width:54px"></button>
        </div>
        <button id="dub-key" data-cap="让机器提议剪一段刚才——齿孔亮起，顺着撕">DUB</button>
      </div>
    </div>
    <div id="walnut-rail"></div>
  </div>

  <div id="keylight"></div>
  <div id="vignette"></div>
  <div id="grain"></div>
  <div id="grain-dark"></div><!-- 暗区抖动（丁-E4）：overlay 颗粒在暗处乘没了，此层 screen 补抖动防色带 -->
  <canvas id="lens"></canvas>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
